syntax = "proto3";

package staynest.finance.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.staynest.finance.v1";
option java_multiple_files = true;

// payment-service: Payment orchestrator. PCI-DSS scope minimised:
// raw PAN never enters this service — only `PaymentToken` (see common/types.proto).
service PaymentService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
