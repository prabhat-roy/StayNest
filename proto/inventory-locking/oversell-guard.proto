syntax = "proto3";

package staynest.inventory_locking.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.staynest.inventorylocking.v1";
option java_multiple_files = true;

// oversell-guard: Atomic overbook prevention guard.
// Hard-rejects any commit that would exceed authorised overbooking ratio.
service OversellGuardService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
