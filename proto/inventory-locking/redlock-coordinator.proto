syntax = "proto3";

package staynest.inventory_locking.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.staynest.inventorylocking.v1";
option java_multiple_files = true;

// redlock-coordinator: 3-node Redlock multi-Redis coordinator.
service RedlockCoordinatorService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
