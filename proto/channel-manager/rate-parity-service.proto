syntax = "proto3";

package staynest.channel_manager.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.staynest.channelmanager.v1";
option java_multiple_files = true;

// rate-parity-service: Real-time rate parity monitor (5-min reconciliation window via Flink).
service RateParityService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
