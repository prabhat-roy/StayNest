# StayNest — local development stack
# `make compose-up` brings up the full data plane: Postgres, MongoDB, Redis (3-node Redlock),
# Kafka + Schema Registry, Cassandra, Elasticsearch, TimescaleDB, MinIO, Keycloak,
# Vault, and observability stack.

version: "3.9"

services:
  # ---------- Transactional / Domain Stores ----------
  postgres:
    image: postgres:16
    container_name: staynest-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:8.0
    container_name: staynest-mongo
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]

  cassandra:
    image: cassandra:5.0
    container_name: staynest-cassandra
    ports: ["9042:9042"]
    environment:
      CASSANDRA_CLUSTER_NAME: staynest
    volumes: ["cassandra-data:/var/lib/cassandra"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: staynest-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: ["es-data:/usr/share/elasticsearch/data"]

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: staynest-timescaledb
    environment:
      POSTGRES_USER: ts
      POSTGRES_PASSWORD: ts
      POSTGRES_DB: iot
    ports: ["5433:5432"]
    volumes: ["ts-data:/var/lib/postgresql/data"]

  # ---------- Redis Redlock Cluster (3 independent masters) ----------
  redis-1:
    image: redis:7-alpine
    container_name: staynest-redis-1
    command: ["redis-server", "--appendonly", "yes", "--port", "6379"]
    ports: ["6379:6379"]
    volumes: ["redis1-data:/data"]

  redis-2:
    image: redis:7-alpine
    container_name: staynest-redis-2
    command: ["redis-server", "--appendonly", "yes", "--port", "6379"]
    ports: ["6380:6379"]
    volumes: ["redis2-data:/data"]

  redis-3:
    image: redis:7-alpine
    container_name: staynest-redis-3
    command: ["redis-server", "--appendonly", "yes", "--port", "6379"]
    ports: ["6381:6379"]
    volumes: ["redis3-data:/data"]

  # ---------- Streaming ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: staynest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: staynest-kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: staynest-schema-registry
    depends_on: [kafka]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  nats:
    image: nats:2.10-alpine
    container_name: staynest-nats
    command: ["-js"]
    ports: ["4222:4222", "8222:8222"]

  # ---------- Object storage ----------
  minio:
    image: minio/minio:latest
    container_name: staynest-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]

  # ---------- Identity / Secrets ----------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: staynest-keycloak
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8080:8080"]

  vault:
    image: hashicorp/vault:1.17
    container_name: staynest-vault
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports: ["8200:8200"]

  # ---------- Observability ----------
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: staynest-prometheus
    ports: ["9090:9090"]
    volumes: ["./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: staynest-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  loki:
    image: grafana/loki:3.2.0
    container_name: staynest-loki
    ports: ["3100:3100"]

  jaeger:
    image: jaegertracing/all-in-one:1.61
    container_name: staynest-jaeger
    ports: ["16686:16686", "4317:4317", "4318:4318"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: staynest-otel
    command: ["--config=/etc/otel-collector.yaml"]
    volumes: ["./observability/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro"]
    ports: ["4319:4317"]

  # ---------- Hospitality-specific dev helpers ----------
  htng-mock:
    image: mockoon/cli:8
    container_name: staynest-htng-mock
    command: ["-d", "/data/htng.json", "-p", "3010"]
    volumes: ["./scripts/mocks/htng.json:/data/htng.json:ro"]
    ports: ["3010:3010"]

  ota-mock:
    image: mockoon/cli:8
    container_name: staynest-ota-mock
    command: ["-d", "/data/ota.json", "-p", "3011"]
    volumes: ["./scripts/mocks/ota.json:/data/ota.json:ro"]
    ports: ["3011:3011"]

volumes:
  postgres-data:
  mongo-data:
  cassandra-data:
  es-data:
  ts-data:
  redis1-data:
  redis2-data:
  redis3-data:
  minio-data:
