# OTA partner JWT plugin - Booking.com / Expedia / Airbnb webhook auth
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata: { name: ota-jwt, namespace: staynest }
plugin: jwt
config:
  uri_param_names: [jwt]
  cookie_names: [jwt]
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata: { name: ota-rate-limit, namespace: staynest }
plugin: rate-limiting
config:
  minute: 1000
  policy: redis
