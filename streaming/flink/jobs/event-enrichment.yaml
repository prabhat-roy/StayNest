apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: staynest-event-enrichment, namespace: staynest }
spec:
  deploymentName: staynest-flink
  job:
    jarURI: s3://staynest-flink-jobs/event-enrichment.jar
    parallelism: 4
    upgradeMode: savepoint
    args: ["--source-topic", "staynest.cdc.public.events", "--sink-topic", "staynest.events.enriched"]
