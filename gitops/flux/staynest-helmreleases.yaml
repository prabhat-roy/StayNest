# Flux HelmRelease - reference HelmRelease for the api-gateway chart.
# Per-service HelmReleases generated by an external tool.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: staynest-platform, namespace: staynest }
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/charts/api-gateway
      sourceRef: { kind: GitRepository, name: staynest, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: staynest-cloud-overlay
      valuesKey: cloud-values.yaml
