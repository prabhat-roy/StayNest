apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: staynest-canary-analysis
  namespace: staynest
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 60s
      successCondition: result[0] >= 0.99
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[5m]))
    - name: p99-latency
      interval: 60s
      successCondition: result[0] <= 1
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{service="{{args.service-name}}"}[5m]))
              by (le))
    - name: booking-conversion
      interval: 60s
      successCondition: result[0] >= 0.95
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            sum(rate(staynest_booking_completed_total[5m]))
            /
            sum(rate(staynest_booking_initiated_total[5m]))
