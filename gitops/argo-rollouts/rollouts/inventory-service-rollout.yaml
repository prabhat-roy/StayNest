# Inventory service - canary with strict booking-conversion analysis
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: inventory-service, namespace: staynest }
spec:
  replicas: 5
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause: { duration: 10m }
        - analysis:
            templates: [{ templateName: staynest-canary-analysis }]
            args: [{ name: service-name, value: inventory-service }]
        - setWeight: 25
        - pause: { duration: 10m }
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: inventory-service }
  template:
    metadata:
      labels: { app.kubernetes.io/name: inventory-service }
    spec:
      containers:
        - name: inventory-service
          image: harbor.staynest.internal/staynest/inventory-service:latest
          ports: [{ containerPort: 50504 }]
