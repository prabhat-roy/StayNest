---
apiVersion: v1
kind: ResourceQuota
metadata: { name: staynest-quota, namespace: staynest }
spec:
  hard:
    requests.cpu:     "100"
    requests.memory:  200Gi
    limits.cpu:       "200"
    limits.memory:    400Gi
    pods:             "500"
    persistentvolumeclaims: "50"
---
apiVersion: v1
kind: LimitRange
metadata: { name: staynest-limits, namespace: staynest }
spec:
  limits:
    - type: Container
      default:        { cpu: 500m, memory: 512Mi }
      defaultRequest: { cpu: 50m,  memory: 64Mi }
      max:            { cpu: 4,    memory: 4Gi }
