---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: staynest-service-reader }
rules:
  - apiGroups: [""]
    resources: [pods, services, configmaps]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: staynest-platform-admin }
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: staynest-property-manager }
rules:
  # Property managers can manage hospitality services within their property scope
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, exec]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, watch]
