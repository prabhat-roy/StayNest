apiVersion: apps/v1
kind: Deployment
metadata:
  name: demand-forecast
  namespace: staynest
  labels:
    app.kubernetes.io/name: demand-forecast
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: rms
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: demand-forecast } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: demand-forecast, staynest.io/domain: rms }
    spec:
      serviceAccountName: demand-forecast
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: demand-forecast
          image: harbor.staynest.internal/staynest/demand-forecast:latest
          ports: [{ containerPort: 50080, name: http }]
          envFrom: [{ configMapRef: { name: demand-forecast } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
