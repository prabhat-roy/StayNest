apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: staynest
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: api-gateway, staynest.io/domain: platform }
    spec:
      serviceAccountName: api-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: api-gateway
          image: harbor.staynest.internal/staynest/api-gateway:latest
          ports: [{ containerPort: 50000, name: http }]
          envFrom: [{ configMapRef: { name: api-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50000 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50000 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m,  memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
