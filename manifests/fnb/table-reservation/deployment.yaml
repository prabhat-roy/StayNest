apiVersion: apps/v1
kind: Deployment
metadata:
  name: table-reservation
  namespace: staynest
  labels:
    app.kubernetes.io/name: table-reservation
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: fnb
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: table-reservation } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: table-reservation, staynest.io/domain: fnb }
    spec:
      serviceAccountName: table-reservation
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: table-reservation
          image: harbor.staynest.internal/staynest/table-reservation:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: table-reservation } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
