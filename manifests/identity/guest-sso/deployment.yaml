apiVersion: apps/v1
kind: Deployment
metadata:
  name: guest-sso
  namespace: staynest
  labels:
    app.kubernetes.io/name: guest-sso
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: guest-sso } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: guest-sso, staynest.io/domain: identity }
    spec:
      serviceAccountName: guest-sso
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: guest-sso
          image: harbor.staynest.internal/staynest/guest-sso:latest
          ports: [{ containerPort: 50021, name: http }]
          envFrom: [{ configMapRef: { name: guest-sso } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
