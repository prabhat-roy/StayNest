apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-rbac
  namespace: staynest
  labels:
    app.kubernetes.io/name: pms-rbac
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: pms-rbac } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pms-rbac, staynest.io/domain: identity }
    spec:
      serviceAccountName: pms-rbac
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: pms-rbac
          image: harbor.staynest.internal/staynest/pms-rbac:latest
          ports: [{ containerPort: 50024, name: http }]
          envFrom: [{ configMapRef: { name: pms-rbac } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50024 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50024 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
