apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-parity
  namespace: staynest
  labels:
    app.kubernetes.io/name: rate-parity
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: channel-manager
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: rate-parity } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rate-parity, staynest.io/domain: channel-manager }
    spec:
      serviceAccountName: rate-parity
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: rate-parity
          image: harbor.staynest.internal/staynest/rate-parity:latest
          ports: [{ containerPort: 50102, name: http }]
          envFrom: [{ configMapRef: { name: rate-parity } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
