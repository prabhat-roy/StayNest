apiVersion: apps/v1
kind: Deployment
metadata:
  name: ota-connector
  namespace: staynest
  labels:
    app.kubernetes.io/name: ota-connector
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: channel-manager
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: ota-connector } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ota-connector, staynest.io/domain: channel-manager }
    spec:
      serviceAccountName: ota-connector
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: ota-connector
          image: harbor.staynest.internal/staynest/ota-connector:latest
          ports: [{ containerPort: 50100, name: http }]
          envFrom: [{ configMapRef: { name: ota-connector } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
