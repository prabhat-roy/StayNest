apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-service
  namespace: staynest
  labels: { app.kubernetes.io/name: pms-service, app.kubernetes.io/part-of: staynest, staynest.io/domain: pms }
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/name: pms-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pms-service, staynest.io/domain: pms }
    spec:
      serviceAccountName: pms-service
      containers:
        - name: pms-service
          image: harbor.staynest.internal/staynest/pms-service:latest
          ports: [{ containerPort: 50200, name: http }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 30 }
          readinessProbe: { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 10 }
