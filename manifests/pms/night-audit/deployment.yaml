apiVersion: apps/v1
kind: Deployment
metadata:
  name: night-audit
  namespace: staynest
  labels:
    app.kubernetes.io/name: night-audit
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: pms
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: night-audit } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: night-audit, staynest.io/domain: pms }
    spec:
      serviceAccountName: night-audit
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: night-audit
          image: harbor.staynest.internal/staynest/night-audit:latest
          ports: [{ containerPort: 50043, name: http }]
          envFrom: [{ configMapRef: { name: night-audit } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50043 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50043 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
