apiVersion: apps/v1
kind: Deployment
metadata:
  name: occupancy-analytics
  namespace: staynest
  labels:
    app.kubernetes.io/name: occupancy-analytics
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: occupancy-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: occupancy-analytics, staynest.io/domain: analytics }
    spec:
      serviceAccountName: occupancy-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: occupancy-analytics
          image: harbor.staynest.internal/staynest/occupancy-analytics:latest
          ports: [{ containerPort: 50321, name: http }]
          envFrom: [{ configMapRef: { name: occupancy-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
