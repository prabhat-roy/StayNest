apiVersion: apps/v1
kind: Deployment
metadata:
  name: guest-analytics
  namespace: staynest
  labels:
    app.kubernetes.io/name: guest-analytics
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: guest-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: guest-analytics, staynest.io/domain: analytics }
    spec:
      serviceAccountName: guest-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: guest-analytics
          image: harbor.staynest.internal/staynest/guest-analytics:latest
          ports: [{ containerPort: 50322, name: http }]
          envFrom: [{ configMapRef: { name: guest-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50322 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
