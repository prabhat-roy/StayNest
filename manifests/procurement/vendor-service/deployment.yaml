apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-service
  namespace: staynest
  labels:
    app.kubernetes.io/name: vendor-service
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: procurement
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: vendor-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vendor-service, staynest.io/domain: procurement }
    spec:
      serviceAccountName: vendor-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: vendor-service
          image: harbor.staynest.internal/staynest/vendor-service:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: vendor-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
