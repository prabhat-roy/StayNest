apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-costing
  namespace: staynest
  labels:
    app.kubernetes.io/name: recipe-costing
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: procurement
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: recipe-costing } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: recipe-costing, staynest.io/domain: procurement }
    spec:
      serviceAccountName: recipe-costing
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: recipe-costing
          image: harbor.staynest.internal/staynest/recipe-costing:latest
          ports: [{ containerPort: 50262, name: http }]
          envFrom: [{ configMapRef: { name: recipe-costing } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50262 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50262 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
