apiVersion: apps/v1
kind: Deployment
metadata:
  name: payroll-integration
  namespace: staynest
  labels:
    app.kubernetes.io/name: payroll-integration
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: staff
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: payroll-integration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: payroll-integration, staynest.io/domain: staff }
    spec:
      serviceAccountName: payroll-integration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: payroll-integration
          image: harbor.staynest.internal/staynest/payroll-integration:latest
          ports: [{ containerPort: 50282, name: http }]
          envFrom: [{ configMapRef: { name: payroll-integration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
