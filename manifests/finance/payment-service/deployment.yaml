# Payment service - PCI-DSS scope MINIMISED via tokenisation. No raw PAN ever.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: staynest-finance
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: staynest
    staynest.io/domain: finance
    staynest.io/pci-scope: tokenised
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/name: payment-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: payment-service, staynest.io/pci-scope: tokenised }
    spec:
      serviceAccountName: payment-service
      containers:
        - name: payment-service
          image: harbor.staynest.internal/staynest/payment-service:latest
          ports: [{ containerPort: 51201, name: http }]
          env:
            - { name: REQUIRE_TOKENISATION, value: "true" }
            - { name: RAW_PAN_BLOCKED,      value: "true" }
          livenessProbe:  { httpGet: { path: /healthz, port: 51201 } }
          readinessProbe: { httpGet: { path: /healthz, port: 51201 } }
