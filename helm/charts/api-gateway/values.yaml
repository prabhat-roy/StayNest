# Cloud-agnostic defaults for api-gateway.
# Overlay with values-{aws|gcp|azure}.yaml for cloud-specific settings.

image:
  repository: staynest/api-gateway
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 50000
  targetPort: 50000

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 1000m, memory: 512Mi }

probes:
  liveness:
    httpGet: { path: /healthz, port: 50000 }
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    httpGet: { path: /healthz, port: 50000 }
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  annotations: {}

podLabels:
  app.kubernetes.io/name: api-gateway
  app.kubernetes.io/part-of: staynest
  staynest.io/domain: platform
  staynest.io/owner-team: platform

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile: { type: RuntimeDefault }

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: ["ALL"] }

env: []
envFrom: []

config:
  LOG_LEVEL: info

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
