image: { repository: staynest/auth-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 51700, targetPort: 51700 }
resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 2000m, memory: 1Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 51700 }, initialDelaySeconds: 20, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 51700 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: auth-service, app.kubernetes.io/part-of: staynest, staynest.io/domain: identity }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
cloud: { provider: "", storageClass: "", ingressClass: "" }
