image: { repository: staynest/pricing-engine, tag: "", pullPolicy: IfNotPresent }
replicaCount: 3
service: { type: ClusterIP, port: 50402, targetPort: 50402 }
resources: { requests: { cpu: 200m, memory: 512Mi }, limits: { cpu: 2000m, memory: 2Gi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50402 }, initialDelaySeconds: 30, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50402 }, initialDelaySeconds: 10, periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: pricing-engine, app.kubernetes.io/part-of: staynest, staynest.io/domain: rms }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info, JAVA_OPTS: "-XX:+UseG1GC -Xmx1536m" }
cloud: { provider: "", storageClass: "", ingressClass: "" }
