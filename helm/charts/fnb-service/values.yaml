image: { repository: staynest/fnb-service, tag: "", pullPolicy: IfNotPresent }
replicaCount: 2
service: { type: ClusterIP, port: 50800, targetPort: 50800 }
resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 1000m, memory: 512Mi } }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50800 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50800 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels: { app.kubernetes.io/name: fnb-service, app.kubernetes.io/part-of: staynest, staynest.io/domain: fnb }
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
cloud: { provider: "", storageClass: "", ingressClass: "" }
