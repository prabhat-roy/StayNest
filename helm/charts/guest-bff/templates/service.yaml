apiVersion: v1
kind: Service
metadata:
  name: {{ include "guest-bff.fullname" . }}
  labels: {{- include "guest-bff.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports: [{ port: {{ .Values.service.port }}, targetPort: http, protocol: TCP, name: http }]
  selector: {{- include "guest-bff.selectorLabels" . | nindent 4 }}
