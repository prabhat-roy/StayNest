image:
  repository: staynest/guest-bff
  tag: ""
  pullPolicy: IfNotPresent
replicaCount: 2
service: { type: ClusterIP, port: 50100, targetPort: 50100 }
resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 1000m, memory: 512Mi }
probes:
  liveness:  { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 15, periodSeconds: 20 }
  readiness: { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 5,  periodSeconds: 10 }
serviceAccount: { create: true, annotations: {} }
podLabels:
  app.kubernetes.io/name: guest-bff
  app.kubernetes.io/part-of: staynest
  staynest.io/domain: platform
podAnnotations: {}
securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: { type: RuntimeDefault } }
containerSecurityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
env: []
envFrom: []
config: { LOG_LEVEL: info }
cloud: { provider: "", storageClass: "", ingressClass: "" }
