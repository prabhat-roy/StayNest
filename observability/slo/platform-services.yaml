apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: api-gateway-availability, namespace: observability }
spec:
  target: '99.95'
  window: 4w
  indicator:
    ratio:
      errors: { metric: http_requests_total{app="api-gateway",status=~"5.."} }
      total:  { metric: http_requests_total{app="api-gateway"} }
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: booking-confirmation-latency, namespace: observability }
spec:
  target: '99.9'
  window: 4w
  indicator:
    latency:
      success:  { metric: staynest_booking_confirmation_duration_seconds_bucket{le="3"} }
      total:    { metric: staynest_booking_confirmation_duration_seconds_count }
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: pos-transaction-latency, namespace: observability }
spec:
  target: '99.9'
  window: 4w
  indicator:
    latency:
      success:  { metric: staynest_pos_transaction_duration_seconds_bucket{le="1"} }
      total:    { metric: staynest_pos_transaction_duration_seconds_count }
