server: { http_listen_port: 3200 }
storage:
  trace:
    backend: s3
    s3: { bucket: staynest-tempo, endpoint: s3.amazonaws.com, region: us-east-1 }
distributor: { receivers: { otlp: { protocols: { grpc: { endpoint: 0.0.0.0:4317 } } } } }
ingester: { trace_idle_period: 30s }
compactor: { compaction: { block_retention: 720h } }
