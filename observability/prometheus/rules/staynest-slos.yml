groups:
  - name: staynest-slo-burn
    rules:
      - alert: StayNestErrorBudgetBurn
        expr: |
          (
            sum(rate(http_requests_total{namespace=~"staynest.*",status=~"5.."}[5m])) by (app)
            /
            sum(rate(http_requests_total{namespace=~"staynest.*"}[5m])) by (app)
          ) > 0.01
        for: 5m
        labels: { severity: critical, team: '{{ $labels.app }}' }
        annotations: { summary: "Error rate >1% for {{ $labels.app }}" }

      - alert: BookingLatencySLO
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(staynest_booking_confirmation_duration_seconds_bucket[5m]))
          ) > 3
        for: 5m
        labels: { severity: critical, team: crs }
        annotations: { summary: "Booking confirmation p99 >3s (SLO breach)" }

      - alert: CheckInLatencySLO
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(staynest_checkin_duration_seconds_bucket[5m]))
          ) > 5
        for: 5m
        labels: { severity: critical, team: pms }
        annotations: { summary: "Check-in p99 >5s (SLO breach)" }

      - alert: POSTransactionLatencySLO
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(staynest_pos_transaction_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels: { severity: critical, team: fnb }
        annotations: { summary: "POS transaction p99 >1s (SLO breach)" }
