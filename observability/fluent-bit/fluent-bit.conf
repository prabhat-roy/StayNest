[SERVICE]
    Daemon Off
    HTTP_Server On
    HTTP_Port 2020
    Parsers_File parsers.conf

[INPUT]
    Name tail
    Path /var/log/containers/*staynest*.log
    Parser docker
    Tag kube.*
    Refresh_Interval 5

[FILTER]
    Name modify
    Match *
    Add cluster staynest

# PII masking - guest PII never reaches Loki
[FILTER]
    Name modify
    Match *
    Rename guest_email   guest_email_redacted
    Rename guest_phone   guest_phone_redacted
    Rename passport_no   passport_no_redacted
    Rename national_id   national_id_redacted

# PCI masking - mask card-like patterns belt+braces with WAF and OPA
[FILTER]
    Name lua
    Match *
    Script pci-mask.lua
    Call mask_pan

[OUTPUT]
    Name loki
    Match kube.*
    host loki
    port 3100
    labels job=staynest, app=$kubernetes['labels']['app.kubernetes.io/name']
