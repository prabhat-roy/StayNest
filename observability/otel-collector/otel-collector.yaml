receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch: {}
  resource:
    attributes:
      - { key: deployment.environment, value: ${ENV},  action: upsert }
      - { key: cloud.provider,         value: ${CLOUD}, action: upsert }
  attributes/pii:
    actions:
      - { key: guest_email,  action: hash }
      - { key: guest_phone,  action: hash }
      - { key: passport_no,  action: hash }
      - { key: card_pan,     action: delete }  # PCI - never log card data

exporters:
  otlp/tempo: { endpoint: tempo:4317, tls: { insecure: true } }
  prometheus: { endpoint: 0.0.0.0:9464 }
  loki:       { endpoint: http://loki:3100/loki/api/v1/push }

service:
  pipelines:
    traces:  { receivers: [otlp], processors: [attributes/pii, resource, batch], exporters: [otlp/tempo] }
    metrics: { receivers: [otlp], processors: [resource, batch], exporters: [prometheus] }
    logs:    { receivers: [otlp], processors: [attributes/pii, resource, batch], exporters: [loki] }
