apiVersion: tekton.dev/v1
kind: Pipeline
metadata: { name: staynest-deploy }
spec:
  params:
    - { name: cloud,   type: string }
    - { name: env,     type: string }
    - { name: service, type: string }
    - { name: version, type: string }
  workspaces:
    - { name: source }
    - { name: kubeconfig }
  tasks:
    - name: db-migrate
      taskRef: { name: flyway-migrate }
      workspaces:
        - { name: source, workspace: source }
    - name: helm-upgrade
      taskRef: { name: helm-upgrade-from-source }
      runAfter: [db-migrate]
      workspaces:
        - { name: source,     workspace: source }
        - { name: kubeconfig, workspace: kubeconfig }
      params:
        - { name: charts_dir,        value: "helm/charts/$(params.service)" }
        - { name: namespace,         value: staynest }
        - { name: release_name,      value: "$(params.service)" }
        - { name: extra_values_files, value: "values.yaml,values-$(params.cloud).yaml" }
