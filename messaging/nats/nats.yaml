# NATS JetStream - low-latency real-time channels for Elixir guest-chat + housekeeping presence
apiVersion: nats.io/v1alpha2
kind: NatsCluster
metadata: { name: staynest-nats, namespace: messaging }
spec:
  size: 3
  natsConfig:
    jetstream:
      enabled: true
      memStorage: { enabled: true, size: 2Gi }
      fileStorage: { enabled: true, size: 100Gi, storageClassName: gp3 }
