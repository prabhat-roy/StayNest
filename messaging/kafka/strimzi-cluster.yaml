apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata: { name: staynest-kafka, namespace: kafka }
spec:
  kafka:
    version: 3.7.1
    replicas: 3
    listeners:
      - { name: tls, port: 9093, type: internal, tls: true, authentication: { type: tls } }
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      min.insync.replicas: 2
    storage: { type: persistent-claim, size: 1Ti, class: gp3 }
  zookeeper:
    replicas: 3
    storage: { type: persistent-claim, size: 100Gi, class: gp3 }
