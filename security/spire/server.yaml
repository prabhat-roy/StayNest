server:
  bind_address: "0.0.0.0"
  bind_port: "8081"
  trust_domain: staynest.internal
  data_dir: /run/spire/data
  log_level: INFO
  ca_subject:
    country: ["US"]
    organization: ["StayNest"]
    common_name: "StayNest SPIRE CA"

plugins:
  DataStore:
    sql:
      plugin_data: { database_type: "sqlite3", connection_string: "/run/spire/data/datastore.sqlite3" }
  KeyManager:
    disk:
      plugin_data: { keys_path: "/run/spire/data/keys.json" }
  NodeAttestor:
    k8s_psat:
      plugin_data: { clusters: { staynest: { service_account_allow_list: ["spire:spire-agent"] } } }
