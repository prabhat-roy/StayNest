# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: staynest
  storage:
    s3: { endpoint: http://minio.staynest.svc:9000, region: us-east-1, bucket: staynest-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.staynest.internal }] }
